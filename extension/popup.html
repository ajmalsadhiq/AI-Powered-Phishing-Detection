<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhishGuard AI</title>
    <style>
      body {
        margin: 0;
        width: 320px;
        font-family: Inter, system-ui, sans-serif;
        background: linear-gradient(180deg, #0f172a, #1e293b);
        color: white;
      }
      .wrap {
        padding: 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      p {
        margin: 0 0 14px;
        font-size: 13px;
        color: #cbd5e1;
      }
      input, button {
        width: 100%;
        border-radius: 12px;
        border: 0;
        padding: 10px 12px;
        font: inherit;
      }
      input {
        margin-bottom: 10px;
        background: #e2e8f0;
        color: #0f172a;
      }
      button {
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
        cursor: pointer;
      }
      .note {
        margin-top: 12px;
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>PhishGuard AI</h1>
      <p>Scans Gmail messages for phishing signals and highlights suspicious content.</p>
      <input id="apiBaseUrl" placeholder="http://localhost:5000" />
      <button id="save">Save API URL</button>
      <div class="note">Tip: keep the backend running while you browse Gmail.</div>
    </div>
    <script>
      const input = document.getElementById('apiBaseUrl');
      const button = document.getElementById('save');
      chrome.storage.sync.get(['apiBaseUrl'], (result) => {
        input.value = result.apiBaseUrl || 'http://localhost:5000';
      });
      button.addEventListener('click', () => {
        chrome.storage.sync.set({ apiBaseUrl: input.value.trim() || 'http://localhost:5000' });
        button.textContent = 'Saved';
        setTimeout(() => {
          button.textContent = 'Save API URL';
        }, 1000);
      });
    </script>
  </body>
</html>
